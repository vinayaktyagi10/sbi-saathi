<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SBI Saathi</title>
<style>
  :root{
    --ink:#1a1740; --indigo:#4338ca; --indigo-soft:#eceafe;
    --safe:#0f9d6b; --alert:#e11d48; --alert-soft:#fdeaf0;
    --paper:#faf7f2; --card:#ffffff; --muted:#6b6786; --line:#ece8f5;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:"Segoe UI",system-ui,-apple-system,sans-serif;
    display:flex; justify-content:center;
  }
  .phone{
    width:100%; max-width:440px; min-height:100vh; background:var(--paper);
    display:flex; flex-direction:column; position:relative;
  }
  header{
    background:var(--ink); color:#fff; padding:18px 20px 16px;
    display:flex; align-items:center; gap:12px;
    transition:background .4s ease;
  }
  header.guarded{ background:var(--alert); }
  .logo{
    width:38px;height:38px;border-radius:11px;background:var(--indigo);
    display:grid;place-items:center;font-weight:800;font-size:18px;
    box-shadow:0 0 0 3px rgba(255,255,255,.12);
  }
  header.guarded .logo{ background:#fff;color:var(--alert) }
  .title{font-weight:700;font-size:18px;line-height:1.1}
  .subtitle{font-size:12px;opacity:.75;margin-top:2px}
  .balance{margin-left:auto;text-align:right}
  .balance .amt{font-weight:700;font-size:16px}
  .balance .lbl{font-size:10px;opacity:.7;text-transform:uppercase;letter-spacing:.05em}

  .chat{flex:1;overflow-y:auto;padding:18px 16px 8px;display:flex;flex-direction:column;gap:12px}
  .row{display:flex;max-width:88%}
  .row.user{align-self:flex-end}
  .row.bot{align-self:flex-start}
  .bubble{
    padding:11px 14px;border-radius:16px;font-size:15px;line-height:1.45;
    white-space:pre-wrap;word-break:break-word;
  }
  .user .bubble{background:var(--indigo);color:#fff;border-bottom-right-radius:5px}
  .bot .bubble{background:var(--card);border:1px solid var(--line);border-bottom-left-radius:5px}

  /* Signature: the protective guard card */
  .guard{
    align-self:stretch;max-width:100%;background:#fff;border:1px solid var(--alert);
    border-left:5px solid var(--alert);border-radius:14px;padding:16px;
    box-shadow:0 10px 30px -12px rgba(225,29,72,.45);
    animation:pop .35s ease;
  }
  @keyframes pop{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}
  .guard .gh{display:flex;align-items:center;gap:10px;font-weight:800;color:var(--alert);font-size:15px}
  .guard .shield{font-size:22px}
  .guard p{margin:10px 0 0;font-size:14px;line-height:1.5}
  .guard ul{margin:8px 0 0;padding-left:18px;font-size:13.5px;line-height:1.55;color:#3a3656}
  .guard .tail{margin-top:12px;font-weight:600;color:var(--ink)}

  .safety-actions{display:flex;gap:10px;padding:10px 16px 4px}
  .safety-actions button{flex:1;padding:13px;border-radius:12px;font-weight:700;font-size:15px;border:0;cursor:pointer}
  .btn-cancel{background:var(--safe);color:#fff}
  .btn-proceed{background:#fff;color:var(--alert);border:1.5px solid var(--alert)!important}

  .chips{display:flex;gap:8px;overflow-x:auto;padding:6px 16px 2px}
  .chip{white-space:nowrap;background:var(--indigo-soft);color:var(--indigo);
    border:0;border-radius:999px;padding:8px 13px;font-size:13px;font-weight:600;cursor:pointer}

  .composer{display:flex;gap:9px;padding:10px 14px 16px;border-top:1px solid var(--line);background:var(--paper)}
  .composer input{flex:1;padding:13px 15px;border:1px solid var(--line);border-radius:14px;font-size:15px;background:#fff}
  .composer input:focus{outline:2px solid var(--indigo);outline-offset:1px}
  .send{background:var(--indigo);color:#fff;border:0;border-radius:14px;padding:0 18px;font-weight:700;cursor:pointer}

  .demo{padding:8px 16px;background:#fff;border-top:1px dashed var(--line);font-size:12px;color:var(--muted)}
  .demo b{color:var(--ink)}
  .toggles{display:flex;gap:14px;margin-top:6px;flex-wrap:wrap}
  .toggles label{display:flex;align-items:center;gap:6px;cursor:pointer;color:var(--ink)}
  @media (prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
  <div class="phone">
    <header id="hdr">
      <div class="logo" id="logo">SS</div>
      <div>
        <div class="title">SBI Saathi</div>
        <div class="subtitle" id="status">Your banking companion · watching every payment</div>
      </div>
      <div class="balance">
        <div class="amt" id="bal">₹48,250</div>
        <div class="lbl">Balance</div>
      </div>
    </header>

    <div class="chat" id="chat"></div>

    <div id="safety" class="safety-actions" style="display:none">
      <button class="btn-cancel" onclick="answer('no')">Cancel — keep me safe</button>
      <button class="btn-proceed" onclick="answer('yes')">I'm sure, proceed</button>
    </div>

    <div class="chips" id="chips"></div>

    <div class="composer">
      <input id="msg" placeholder="Type or speak… e.g. 'pay 800 to Suresh'"
             onkeydown="if(event.key==='Enter')send()" />
      <button class="send" onclick="send()">Send</button>
    </div>

    <div class="demo">
      <b>Demo controls</b> — flip these, then try a payment to see Saathi guard it:
      <div class="toggles">
        <label><input type="checkbox" id="scam"> Scam-call pressure</label>
        <label><input type="checkbox" id="remote"> Screen-share app open</label>
      </div>
    </div>
  </div>

<script>
const chat = document.getElementById('chat');
const CHIPS = ["Hi", "balance kitna hai", "Pay 800 to Suresh Kirana",
               "Send 45000 to Verification Officer", "I want to start saving"];

function renderChips(){
  const c = document.getElementById('chips'); c.innerHTML='';
  CHIPS.forEach(t=>{const b=document.createElement('button');
    b.className='chip';b.textContent=t;b.onclick=()=>{document.getElementById('msg').value=t;send();};
    c.appendChild(b);});
}
function addUser(text){
  const r=document.createElement('div');r.className='row user';
  r.innerHTML=`<div class="bubble"></div>`;r.querySelector('.bubble').textContent=text;
  chat.appendChild(r);scroll();
}
function addBot(data){
  if(data.blocked || data.awaiting_confirmation){ addGuard(data); return; }
  const r=document.createElement('div');r.className='row bot';
  r.innerHTML=`<div class="bubble"></div>`;r.querySelector('.bubble').textContent=data.text;
  chat.appendChild(r);scroll();
}
function addGuard(data){
  // Signature protective card. Parse the agent's structured text into a header,
  // reasons list, and a closing line.
  const lines = data.text.split('\n').filter(x=>x.trim()!=='');
  const head = lines[0];
  const reasons = lines.filter(l=>l.trim().startsWith('•')).map(l=>l.replace('•','').trim());
  const tail = lines[lines.length-1];
  const g=document.createElement('div');g.className='guard';
  g.innerHTML=`<div class="gh"><span class="shield">🛡️</span><span></span></div>
    <p><b>Why I'm cautious:</b></p><ul></ul><div class="tail"></div>`;
  g.querySelector('.gh span:last-child').textContent = head.replace(/^[🛑✋]\s*/,'');
  const ul=g.querySelector('ul'); reasons.forEach(rz=>{const li=document.createElement('li');li.textContent=rz;ul.appendChild(li);});
  g.querySelector('.tail').textContent = tail;
  chat.appendChild(g);
  setGuarded(true);
  document.getElementById('safety').style.display='flex';
  scroll();
}
function setGuarded(on){
  document.getElementById('hdr').classList.toggle('guarded',on);
  document.getElementById('status').textContent = on
    ? 'Payment paused — protecting your money'
    : 'Your banking companion · watching every payment';
}
function scroll(){chat.scrollTop=chat.scrollHeight;}

async function call(text){
  const res = await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      text,
      remote_access: document.getElementById('remote').checked,
      scam_context: document.getElementById('scam').checked
        ? 'police officer says account blocked, pay urgently or face arrest' : '',
    })});
  const data = await res.json();
  document.getElementById('bal').textContent = '₹'+Number(data.balance).toLocaleString('en-IN');
  return data;
}
async function send(){
  const input=document.getElementById('msg');const text=input.value.trim();
  if(!text)return; input.value='';
  document.getElementById('safety').style.display='none';
  addUser(text); addBot(await call(text));
}
async function answer(choice){
  document.getElementById('safety').style.display='none';
  setGuarded(false);
  addUser(choice==='yes'?"I'm sure, proceed":"Cancel — keep me safe");
  addBot(await call(choice));
}
renderChips();
addBot({text:"Namaste! I'm Saathi. I can check your balance, pay someone, or help you start saving — all in your language. I watch every payment and stop scams before your money leaves."});
</script>
</body>
</html>
